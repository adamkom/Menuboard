*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0a0a0a;
  --divider: rgba(255,255,255,0.09);
  --text:    #ffffff;
  --font:    'PPNeueBit', monospace;
}

html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  overflow: hidden;
}

#board {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  width: 100vw;
  height: 100vh;
}

.panel {
  display: flex;
  flex-direction: column;
  background: var(--bg);
  border-right: 1px solid var(--divider);
  overflow: hidden;
}
.panel:last-child { border-right: none; }

/* ── LAYOUT LIST (TV 1, 5, 6) ── */
.layout-list {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: space-evenly;
  padding: 4vh 0;
}
.layout-list .item {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  padding: 0 28px;
  gap: 12px;
}
.layout-list .item-name {
  font-family: var(--font);
  font-size: clamp(1.3rem, 2.6vw, 2.2rem);
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex-shrink: 1;
  min-width: 0;
}
.layout-list .item-price {
  font-family: var(--font);
  font-size: clamp(1.3rem, 2.6vw, 2.2rem);
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.05em;
  white-space: nowrap;
  flex-shrink: 0;
}

/* ── LAYOUT SPLIT (TV 2, 3, 4) ── */
.layout-split {
  flex: 1;
  display: flex;
  flex-direction: row;
}
.layout-split .half {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1.4vh;
  padding: 4vh 16px;
  border-right: 1px solid var(--divider);
}
.layout-split .half:last-child { border-right: none; }
.layout-split .beer-name {
  font-family: var(--font);
  font-size: clamp(1.4rem, 3.2vw, 2.8rem);
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  text-align: center;
  line-height: 1.1;
}
.layout-split .beer-desc {
  font-family: var(--font);
  font-size: clamp(0.9rem, 1.8vw, 1.6rem);
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.07em;
  text-transform: uppercase;
  text-align: center;
}
.layout-split .beer-price {
  font-family: var(--font);
  font-size: clamp(1.2rem, 2.6vw, 2.2rem);
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.06em;
  text-align: center;
}

/* ── FALLBACK ── */
.layout-fallback {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 32px;
}
.fallback-text {
  font-family: var(--font);
  font-size: clamp(1.6rem, 3.5vw, 3.2rem);
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  text-align: center;
  line-height: 1.3;
}

::-webkit-scrollbar { display: none; }
</style>

};

const params = new URLSearchParams(window.location.search);
const SINGLE_PANEL = params.has('panel') ? parseInt(params.get('panel')) : null;

// ── CSV PARSER ──
function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  if (lines.length < 2) return { rows: [], fallback: '' };

  // normalizuj hlavičky – lower case, trim
  const headers = lines[0].split(',').map(h => h.replace(/^"|"$/g,'').trim().toLowerCase());

  const allRows = lines.slice(1).map(line => {
    const vals = []; let cur = '', inQ = false;
    for (const ch of line) {
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { vals.push(cur); cur = ''; }
      else { cur += ch; }
    }
    vals.push(cur);
    const obj = {};
    headers.forEach((h, i) => { obj[h] = (vals[i] || '').replace(/^"|"$/g,'').trim(); });
    return obj;
  });

  // fallback text – hledej v sloupci "if no menu on tv" (case insensitive)
  const fallbackKey = headers.find(h => h.includes('if no menu') || h.includes('fallback') || h.includes('no menu'));
  let fallback = '';
  if (fallbackKey) {
    for (const r of allRows) {
      const v = r[fallbackKey] || '';
      if (v.trim()) { fallback = v.trim(); break; }
    }
  }

  // filtruj jen řádky kde TV má číslo a name není prázdné
  const tvKey = headers.find(h => h === 'tv');
  const nameKey = headers.find(h => h === 'name');
  const rows = allRows.filter(r => {
    const tvVal = tvKey ? (r[tvKey] || '').trim() : '';
    const nameVal = nameKey ? (r[nameKey] || '').trim() : '';
    return tvVal !== '' && nameVal !== '';
  }).map(r => ({
    tv:          (r[tvKey]   || '').trim(),
    name:        (r[nameKey] || '').trim(),
    description: (r['description'] || '').trim(),
    price:       (r['price'] || '').trim(),
  }));

  return { rows, fallback };
}

function saveCache(data) {
  try { localStorage.setItem(CONFIG.cacheKey, JSON.stringify({ data, ts: Date.now() })); } catch(e) {}
}
function loadCache() {
  try { const r = localStorage.getItem(CONFIG.cacheKey); return r ? JSON.parse(r) : null; } catch(e) { return null; }
}

// ── BUILDERS ──
function buildLayoutList(items) {
  const wrap = document.createElement('div');
  wrap.className = 'layout-list';
  for (const item of items) {
    const row = document.createElement('div');
    row.className = 'item';
    row.innerHTML =
      '<span class="item-name">'  + item.name  + '</span>' +
      '<span class="item-price">' + item.price + '</span>';
    wrap.appendChild(row);
  }
  return wrap;
}

function buildLayoutSplit(items) {
  const wrap = document.createElement('div');
  wrap.className = 'layout-split';
  const show = items.slice(0, 2);
  while (show.length < 2) show.push(null);
  for (const item of show) {
    const half = document.createElement('div');
    half.className = 'half';
    if (item) {
      half.innerHTML =
        '<span class="beer-name">'  + item.name + '</span>' +
        (item.description ? '<span class="beer-desc">' + item.description + '</span>' : '') +
        '<span class="beer-price">' + item.price + '</span>';
    }
    wrap.appendChild(half);
  }
  return wrap;
}

function buildLayoutFallback(text) {
  const wrap = document.createElement('div');
  wrap.className = 'layout-fallback';
  const span = document.createElement('span');
  span.className = 'fallback-text';
  span.textContent = text || '—';
  wrap.appendChild(span);
  return wrap;
}

function buildPanel(tvNum, rows, fallback) {
  const panel = document.createElement('div');
  panel.className = 'panel';
  const tvRows = rows.filter(r => r.tv === String(tvNum));

  if (tvRows.length === 0) {
    panel.appendChild(buildLayoutFallback(fallback));
  } else if (tvNum >= 2 && tvNum <= 4) {
    panel.appendChild(buildLayoutSplit(tvRows));
  } else {
    panel.appendChild(buildLayoutList(tvRows));
  }
  return panel;
}

function render(parsed) {
  const { rows, fallback } = parsed;
  const board = document.getElementById('board');
  board.innerHTML = '';
  const tvNums = SINGLE_PANEL !== null ? [SINGLE_PANEL] : [1,2,3,4,5,6];
  if (SINGLE_PANEL !== null) board.style.gridTemplateColumns = '1fr';
  for (const n of tvNums) board.appendChild(buildPanel(n, rows, fallback));
}

async function loadData() {
  try {
    const res = await fetch(CONFIG.sheetsUrl + '&t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const parsed = parseCSV(await res.text());
    if (!parsed.rows.length && !parsed.fallback) throw new Error('empty');
    saveCache(parsed);
    render(parsed);
  } catch(e) {
    console.warn('Sheets load failed:', e.message);
    const cached = loadCache();
    if (cached && cached.data) render(cached.data);
  }
}

loadData();
setInterval(loadData, CONFIG.refreshInterval * 1000);
</script>
